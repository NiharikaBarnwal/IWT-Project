<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repository</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <!-- Logo -->
        <div class="navbar-left">
            <img src="logo.png" alt="Logo">
        </div>

        <!-- Navigation Links -->
        <div class="navbar-links">
            <a href="mywall.html">MyWall</a>
            <a href="repository.html">Repository</a>
            <a href="forum.html">Forum</a>
            <a href="exam.html">Online Exam</a>
        </div>

        <!-- User Info & Logout -->
        <div class="navbar-right">
            <span>Hello Student</span>
            <a href="login.html">Logout</a>
        </div>
    </nav>
    <div class="container">
        <h1>Repository</h1>
        <form id="fileUploadForm" enctype="multipart/form-data">
            <label for="project-name">Project Name</label>
            <input type="text" id="project-name" name="project-name" required>
    
            <label for="project-details">Project Details</label>
            <textarea id="project-details" name="project-details" rows="4" required></textarea>
    
            <label for="tech-stack">Tech Stack</label>
            <input type="text" id="tech-stack" name="tech-stack" required>
    
            <label for="links">Links (optional)</label>
            <input type="url" id="links" name="links">
            
            <label for="file">Upload File:</label>
            <input type="file" id="file" name="file" required>
            <button type="submit">Upload</button>
        </form>
    
        <div id="upload-success" style="display:none;">
            <p>File uploaded successfully!</p>
        </div>
    
        <h2>Uploaded Files</h2>
        <div class="file-list">
            <ul id="file-list">
                <!-- File list dynamically populated by JavaScript -->
            </ul>
        </div>
    </div>
    
</body>
</html>

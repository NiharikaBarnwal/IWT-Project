<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <!-- Logo -->
        <div class="navbar-left">
            <a href="home.html"><img src="source/logo sample.png" alt="Logo"></a>
        </div>

        <!-- Navigation Links -->
        <div class="navbar-links">
            <a href="mywall.html">MyWall</a>
            <a href="repository.html">Repository</a>
            <a href="forum.html">Forum</a>
            <a href="exam.html">Online Exam</a>
        </div>

        <!-- User Info & Logout -->
        <div class="navbar-right">
            <span>Hello Student</span>
            <a href="login.html">Logout</a>
        </div>
    </nav>
    <h2 style="margin-top: 20px;">Forum</h2>
    <form action="#" method="POST">
        <label for="query">Post your query:</label>
        <textarea id="query" name="query" rows="4" cols="50"></textarea>
        <br>
        <button class="navbar" type="submit">Post</button>
    </form>

    <div class="container">
        <h1>Forum</h1>
        <form id="forumForm">
            <label for="question">Ask a Question:</label>
            <textarea id="question" name="question" rows="4" required></textarea>
            <button class="navbar" type="submit">Post Question</button>
        </form>
    
        <div id="question-post-success" style="display:none;">
            <p>Question posted successfully!</p>
        </div>
    
        <h2 style="margin-top: 20px;">Questions</h2>
        <div class="question-list">
            <ul id="question-list">
                <!-- Questions dynamically populated by JavaScript -->
            </ul>
        </div>
    </div>
    
</body>
</html>
